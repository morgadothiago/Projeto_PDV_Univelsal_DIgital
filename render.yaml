services:
  - type: web
    name: pdv-universal-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: EFI_CLIENT_ID
        sync: false
      - key: EFI_CLIENT_SECRET
        sync: false
      - key: EFI_CERT_BASE64
        sync: false
      - key: EFI_PIX_KEY
        sync: false
      - key: EFI_SANDBOX
        value: "false"
    healthCheckPath: /api/v1/health
